name: Build Releases

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: voices-windows.zip
            compress_cmd: PowerShell -Command "Get-ChildItem -Path voices.dist | Compress-Archive -DestinationPath voices-windows.zip -Force"
          - os: ubuntu-latest
            artifact_name: voices-linux.tar.gz
            compress_cmd: tar -czf voices-linux.tar.gz -C voices.dist .
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libespeak-ng-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build with Nuitka
        run: |
          uv run --refresh --with "nuitka>=2.0" --with pyside6 --with soundfile --with kokoro-onnx --with onnxruntime --with espeakng-loader python -m nuitka --standalone --remove-output --enable-plugin=pyside6 --follow-imports --include-package=soundfile --include-package=onnxruntime --include-package=kokoro_onnx --include-package=espeakng_loader --include-package-data=onnxruntime --include-package-data=kokoro_onnx --include-package-data=language_tags --include-package-data=espeakng_loader --include-distribution-metadata=kokoro-onnx --include-distribution-metadata=onnxruntime --assume-yes-for-downloads --disable-ccache --jobs=2 voices.py

      - name: Pack standalone folder
        run: ${{ matrix.compress_cmd }}

      # --- CONSTRUÇÃO DO INSTALADOR .MSI (APENAS NO WINDOWS) ---
      - name: Extract Windows Zip for Installer
        if: runner.os == 'Windows'
        run: |
          mkdir SourceFiles
          Expand-Archive -Path voices-windows.zip -DestinationPath SourceFiles

      - name: Harvest Directory Files (WiX heat)
        if: runner.os == 'Windows'
        run: |
          heat.exe dir SourceFiles -cg AppFilesGroup -dr APPLICATIONFOLDER -sreg -sfrag -srd -gg -b SourceFiles -out files.wxs

      - name: Compile Installer (WiX candle & light)
        if: runner.os == 'Windows'
        run: |
          candle.exe voices.wxs files.wxs
          light.exe -ext WixUIExtension -ice:ICE61 -b SourceFiles voices.wixobj files.wixobj -o VoicesInstaller.msi

      # --- ENVIO DOS ARQUIVOS DIRETAMENTE PARA O RELEASES ---
      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ${{ matrix.artifact_name }}
            ${{ runner.os == 'Windows' && 'VoicesInstaller.msi' || '' }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
