name: Build Releases

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            artifact_name: voices-windows.zip
            # PowerShell precisa do delimitador correto para capturar o conteúdo recursivamente
            compress_cmd: PowerShell -Command "Get-ChildItem -Path voices.dist | Compress-Archive -DestinationPath voices-windows.zip -Force"
          - os: ubuntu-latest
            artifact_name: voices-linux.tar.gz
            compress_cmd: tar -czf voices-linux.tar.gz -C voices.dist .
    runs-on: ${{ matrix.os }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install dependencies (Linux only)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libasound2-dev libespeak-ng-dev

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Build with Nuitka
        run: |
          uv run --refresh --with "nuitka>=2.0" --with pyside6 --with soundfile --with kokoro-onnx --with onnxruntime --with espeakng-loader python -m nuitka --standalone --remove-output --enable-plugin=pyside6 --follow-imports --include-package=soundfile --include-package=onnxruntime --include-package=kokoro_onnx --include-package=espeakng_loader --include-data-dir=assets=assets --include-package-data=onnxruntime --include-package-data=kokoro_onnx --include-package-data=language_tags --include-package-data=espeakng_loader --assume-yes-for-downloads --disable-ccache --jobs=2 voices.py

      # Unificamos os dois passos antigos em um único passo dinâmico usando a matrix
      - name: Pack standalone folder
        run: ${{ matrix.compress_cmd }}

      - name: Upload Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
